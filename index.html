<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Color</title>
  <style>
	* {
		border: 0;
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
    body{
        background-color:#0c0c0e;
	    display: grid;
	    place-items: center;
	    height: 100vh;
    }
    main {
	    display: flex;
	    justify-content: center;
	    gap: 1.5em 3em;
	    padding: 1.5em;
	    flex-wrap: wrap;
    }
.card {
  background-color: #23242b;
  border-radius: 2em;
  width: 16em;
  height: 28em;
  padding: 1em;
  display: flex;
  flex-direction: column;
  gap: 1em;
}

.card-color {
  background-color: #A7E8F2; 
  border-radius: 1.2em;
  flex: 1;
}

.card-info {
  color: white;
  display: flex;
  flex-direction: column;
  gap: 0.4em;
}
  </style>
</head>
<body>
<main>
  <div class="card">
    <div class="card-color" style="background-color:#A7E8F2"></div>
    <div class="card-info">
      <span class="card-hex">#A7E8F2</span>
      <span class="card-name">Icy Breeze</span>
    </div>
  </div>

  <div class="card">
    <div class="card-color" style="background-color:#8FA7B3"></div>
    <div class="card-info">
      <span class="card-hex">#8FA7B3</span>
      <span class="card-name">Sky gray</span>
    </div>
  </div>

  <div class="card">
    <div class="card-color" style="background-color:#0F52BA"></div>
    <div class="card-info">
      <span class="card-hex">#0F52BA</span>
      <span class="card-name">Sapphire blue</span>
    </div>
  </div>

  <div class="card">
    <div class="card-color" style="background-color:#C5C6C7"></div>
    <div class="card-info">
      <span class="card-hex">#C5C6C7</span>
      <span class="card-name">Silver Mist</span>
    </div>
  </div>

  <div class="card">
    <div class="card-color" style="background-color:#8AB8C2"></div>
    <div class="card-info">
      <span class="card-hex">#8AB8C2</span>
      <span class="card-name">Morning Tide</span>
    </div>
  </div>

  <div class="card">
    <div class="card-color" style="background-color:#488496"></div>
    <div class="card-info">
      <span class="card-hex">#488496</span>
      <span class="card-name">Azure Mist</span>
    </div>
  </div>

  <div class="card">
    <div class="card-color" style="background-color:#004643"></div>
    <div class="card-info">
      <span class="card-hex">#004643</span>
      <span class="card-name">Cyprus</span>
    </div>
  </div>

  <div class="card">
    <div class="card-color" style="background-color:#FAFAFA"></div>
    <div class="card-info">
      <span class="card-hex">#FAFAFA</span>
      <span class="card-name">Cloud White</span>
    </div>
  </div>
</main>
</body>
</html>
